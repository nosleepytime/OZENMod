name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspace @ozenmod/shared --workspace @ozenmod/ai --if-present

      - name: Package desktop app
        working-directory: apps/desktop
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        shell: bash
        working-directory: apps/desktop/release
        run: |
          shopt -s nullglob
          files=(*.exe *.dmg *.zip *.AppImage)
          if [ ${#files[@]} -gt 0 ]; then
            if command -v sha256sum >/dev/null; then
              sha256sum "${files[@]}" >> SHA256SUMS.txt
            else
              shasum -a 256 "${files[@]}" >> SHA256SUMS.txt
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ozenmod-${{ matrix.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/SHA256SUMS.txt
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/SHA256SUMS.txt
