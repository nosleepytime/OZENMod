name: ✨ Feature request
description: Suggest an idea or improvement
title: '[Feature]: '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation as a streamer/moderator, not the solution.
      placeholder: During raids, I need…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: A setting that…
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which part of OZENMod?
      options:
        - Moderation engine / AI
        - Desktop app
        - Website / dashboard
        - AI providers
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This works with a 100% free stack (no paid service required for the free tier).
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true
