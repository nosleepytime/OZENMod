name: 🐛 Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much as you can.
  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      options:
        - Desktop app (Windows)
        - Desktop app (macOS)
        - Website / dashboard
        - Moderation behavior (bot decisions)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: The bot timed out a user for a clean message…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.1.0 (app About page) or website
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste app logs if available. Never paste tokens or API keys.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I removed all tokens/keys/personal data from logs.
          required: true
