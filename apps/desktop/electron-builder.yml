appId: app.ozenmod.desktop
productName: OZENMod
copyright: Copyright © 2026 OZENMod contributors
# Pinned so electron-builder never has to introspect a hoisted node_modules in
# the npm-workspaces monorepo (keep in sync with the electron devDependency).
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Publish to GitHub Releases (free). electron-updater reads this feed.
publish:
  provider: github
  owner: nosleepytime
  repo: OZENMod
win:
  target:
    - nsis
  artifactName: OZENMod-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
    - zip
  category: public.app-category.social-networking
  artifactName: OZENMod-${version}-${arch}.${ext}
dmg:
  title: OZENMod ${version}
linux:
  target:
    - AppImage
  category: Network
